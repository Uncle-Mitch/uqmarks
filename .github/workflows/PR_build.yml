name: Build and Dockerise UQMarks

on:
  pull_request:
    branches: ["master"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  js-quality-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./react-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier format check
        run: npm run format:check

      - name: Run TypeScript typecheck
        run: npm run typecheck

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync Python dependencies
        run: uv sync --dev

      - name: Run API test suite
        run: uv run python -m unittest tests.test_api -v

  docker-build:
    needs: [js-quality-checks, python-tests]
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name to lowercase and set tag
        run: |
          LOWER_IMAGE_NAME=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "LOWER_IMAGE_NAME=$LOWER_IMAGE_NAME" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "TAG=pr-${{ github.event.pull_request.number }}-build-${{ github.run_number }}" >> $GITHUB_ENV
          else
            echo "TAG=latest-build-${{ github.run_number }}" >> $GITHUB_ENV
          fi

          echo "Building image: $LOWER_IMAGE_NAME:$TAG"

      - name: Build Docker image
        run: |
          docker build -t "$LOWER_IMAGE_NAME:$TAG" .

      - name: Save Docker image to tar
        run: |
          docker save "$LOWER_IMAGE_NAME:$TAG" -o uqmarks-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: uqmarks-docker-image
          path: uqmarks-image.tar
